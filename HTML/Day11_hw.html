<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Card</title>
    <link rel="stylesheet" href="Day11_hw.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <div id="page1">
      <div class="card">
        <span class="sale-badge">SALE</span>
        <img src="../category/denim jackets.avif" alt="" />
        <h2>Samsung S25</h2>
        <p class="price">₹69,999</p>
        <button>Buy Now</button>
      </div>
    </div>
    <div id="page2">
      <div id="reviewDiv">
        <div id="nav">
          <div id="navLeft">
            <img
              src="../icons/back.png"
              alt="back"
              style="width: 30px; height: 30px"
            />
            <h2 style="color: gray">&nbsp; Ratings & Reviews</h2>
          </div>
          <div id="navRight">
            <img
              src="../icons/plus.png"
              alt=""
              style="width: 30px; height: 30px; margin: 0px 10px"
            />
            <img
              src="../icons/search.png"
              alt=""
              style="width: 30px; height: 30px; margin: 0px 10px"
            />
            <img
              src="../icons/heart.png"
              alt=""
              style="width: 30px; height: 30px; margin: 0px 10px"
            />
            <img
              src="../icons/bag.png"
              alt=""
              style="width: 30px; height: 30px; margin: 0px 10px"
            />
          </div>
        </div>
        <div id="content">
          <div id="leftReview">
            <h1 style="font-size: 60px; color: black">
              4.2 <i class="fa-solid fa-star" style="color: green"></i>
            </h1>
            <h1 style="font-size: 20px; color: gray">3114 verified buyers</h1>
          </div>
          <div id="rightReview">
            <h4
              style="
                display: flex;
                justify-content: center;
                align-items: center;
                gap: 10px;
              "
            >
              5 <i class="fa-solid fa-star"></i>
              <input type="range" min="0" max="100" value="80" />1.88k
            </h4>
            <br />
            <h4
              style="
                display: flex;
                justify-content: center;
                align-items: center;
                gap: 10px;
              "
            >
              4 <i class="fa-solid fa-star"></i>
              <input type="range" min="0" max="100" value="40" />651
            </h4>
            <br />
            <h4
              style="
                display: flex;
                justify-content: center;
                align-items: center;
                gap: 10px;
              "
            >
              3 <i class="fa-solid fa-star"></i>
              <input type="range" min="0" max="100" value="30" />257
            </h4>
            <br />
            <h4
              style="
                display: flex;
                justify-content: center;
                align-items: center;
                gap: 10px;
              "
            >
              2 <i class="fa-solid fa-star"></i>
              <input type="range" min="0" max="100" value="10" />112
            </h4>
            <br />
            <h4
              style="
                display: flex;
                justify-content: center;
                align-items: center;
                gap: 10px;
              "
            >
              1 <i class="fa-solid fa-star"></i>
              <input type="range" min="0" max="100" value="15" />215
            </h4>
            <br />
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
