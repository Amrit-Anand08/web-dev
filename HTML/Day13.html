<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amazon Clone</title>

    <link rel="stylesheet" href="Day13.css" />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
  </head>
  <body>
    <!-- Navbar -->
    <header>
      <nav class="navbar">
        <div class="logo border">
          <img
            src="https://upload.wikimedia.org/wikipedia/commons/a/a9/Amazon_logo.svg"
            alt=""
          />
        </div>

        <div class="location border">
          <i class="fa-solid fa-location-dot"></i>
          <div>
            <p>Delivering to Noida 110091</p>
            <h4>Update location</h4>
          </div>
        </div>

        <div class="search">
          <select>
            <option>All</option>
          </select>

          <input type="text" placeholder="Search Amazon.in" />

          <button>
            <i class="fa-solid fa-magnifying-glass"></i>
          </button>
        </div>

        <div class="language border">🇮🇳 EN</div>

        <div class="signin border">
          <p>Hello, sign in</p>
          <h4>Account & Lists</h4>
        </div>

        <div class="orders border">
          <p>Returns</p>
          <h4>& Orders</h4>
        </div>

        <div class="cart border">
          <i class="fa-solid fa-cart-shopping"></i>
          Cart
        </div>
      </nav>

      <!-- Secondary Navbar -->

      <div class="panel">
        <div class="panel-item">
          <i class="fa-solid fa-bars"></i>
          All
        </div>

        <div class="panel-item">Fresh</div>
        <div class="panel-item">MX Player</div>
        <div class="panel-item">Sell</div>
        <div class="panel-item">Bestsellers</div>
        <div class="panel-item">Today's Deals</div>
        <div class="panel-item">Prime</div>
        <div class="panel-item">Mobiles</div>
        <div class="panel-item">New Releases</div>
        <div class="panel-item">Customer Service</div>
      </div>
    </header>

    <!-- Hero -->

    <section class="hero">
      <button class="arrow left">
        <i class="fa-solid fa-chevron-left"></i>
      </button>

      <button class="arrow right">
        <i class="fa-solid fa-chevron-right"></i>
      </button>
    </section>
  </body>
</html>
