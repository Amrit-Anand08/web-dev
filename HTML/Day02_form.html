<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Registration Form</title>
  </head>

  <body>
    <fieldset>
      <legend><h1>Student Registeration Form</h1></legend>
      <form>
        <label for="name">Enter your Name : </label>
        <input type="text" id="name" /> <br /><br />

        <label for="email">Enter your Email : </label>
        <input type="email" id="email" /> <br /><br />

        <label for="mobile">Enter your Mobile : </label>
        <input type="tel" id="mobile" /> <br /><br />

        <label for="password">Enter your password : </label>
        <input type="password" id="password" /> <br /><br />

        <label for="gender">Enter your Gender : </label>
        <input type="radio" id="male" name="value" />
        <label for="male">Male</label>
        <input type="radio" id="female" name="value" />
        <label for="female">Female</label>
        <input type="radio" id="other" name="value" />
        <label for="other">Other</label> <br />
        <br />

        <label for="hobby">Enter your Skills : </label>
        <input type="checkbox" id="html" />
        <label for="html">html</label>
        <input type="checkbox" id="css" />
        <label for="css">Css</label>
        <input type="checkbox" id="javascript" />
        <label for="javascript">javascript</label>
        <input type="checkbox" id="react" />
        <label for="react">react</label>
        <input type="checkbox" id="NodeJs" />
        <label for="NodeJs">Node.Js</label>
        <br />
        <br />

        <label for="city">Enter your City : </label>
        <select id="city">
          <option value="faridabad">faridabad</option>
          <option value="Delhi">Delhi</option>
          <option value="ghaziabad">ghaziabad</option>
        </select>
        <br />
        <br />

        <label for="dob">Enter your DOB : </label>
        <input type="date" id="dob" /> <br /><br />

        <label for="address">Enter your Address</label>
        <textarea name="address" id="address"></textarea>
        <br /><br />

        <button>submit</button>
        <button>reset</button>
      </form>
    </fieldset>
  </body>
</html>
