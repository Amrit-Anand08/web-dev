<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="Cards02.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="

  <body>
    <div id="main">

          src="https://framerusercontent.com/images/1SjD2TWrw72Lcf5Gq5LBQVLVLk.png?width=1792&height=1792"
          alt=""
        />
        <div class="info">
          <div class="left">
            <h1 style="font-size: 26px; color: black">Kate Lee Cobe</h1>
            <h3 style="font-size: 16px; color: gray">Founder Kudos</h3>
          </div>
          <div class="right">
            <i style="font-size: 30px" class="fa-brands fa-x-twitter"></i>
            <i style="font-size: 30px" class="fa-brands fa-linkedin"></i>
          </div>
        </div>
      </div>
      <div class="card">

        />
        <div class="info">
          <div class="left">
